# Dependency Audit — the cloud version of the repo-night-watch squad (template).
#
# Runs on GitHub Actions (cloud, no local machine needed) on a weekly
# schedule and on demand. Pure mechanical check, no secrets: pnpm audit +
# an outdated-majors scan. Opens/updates a labelled issue when a high or
# critical advisory appears, so you find out without watching a dashboard.
#
# Copy into <repo>/.github/workflows/. pnpm shown; for npm use
# `npm audit --audit-level=high`, for yarn `yarn npm audit`.

name: dependency-audit

on:
  schedule:
    - cron: "23 6 * * 1" # Mondays 06:23 UTC, off the :00 mark
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1   # <-- your pnpm version
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Run pnpm audit (high + critical)
        id: audit
        shell: bash
        run: |
          set -uo pipefail
          # --audit-level high makes pnpm exit non-zero only on high/critical.
          if pnpm audit --audit-level high --json > audit.json 2>audit.err; then
            echo "status=ok" >> "$GITHUB_OUTPUT"
            echo "No high/critical advisories."
          else
            echo "status=fail" >> "$GITHUB_OUTPUT"
            # Human-readable summary for the issue body (fallback to raw).
            pnpm audit --audit-level high > audit.txt 2>&1 || true
            {
              echo 'report<<KT_AUDIT_EOF'
              head -c 5000 audit.txt
              echo
              echo 'KT_AUDIT_EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Outdated direct dependencies (informational)
        if: always()
        shell: bash
        run: |
          echo "Outdated direct deps (majors worth noting):"
          pnpm outdated   # <-- or scope to your app package || true

      - name: Open or update advisory issue
        if: steps.audit.outputs.status == 'fail'
        uses: actions/github-script@v7
        with:
          script: |
            // toJSON output must never be spliced into a template literal:
            // backticks/${} in third-party advisory text would break or
            // execute inside github-script. Assign, then concatenate.
            const report = ${{ toJSON(steps.audit.outputs.report) }};
            const body = "Dependency Audit found high/critical advisories:\n\n```\n" + report + "\n```\n\n_Automated weekly by `.github/workflows/dependency-audit.yml`. Run it on demand from the Actions tab._";
            const title = "🟠 Dependency Audit: high/critical advisory";
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "dependency-audit"
            });
            if (existing.data.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data[0].number, body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ["dependency-audit"]
              });
            }

      # Optional Telegram push alert - dormant until TELEGRAM_BOT_TOKEN +
      # TELEGRAM_CHAT_ID repo secrets exist. Static text + run URL only;
      # never interpolate advisory content (injection surface).
      - name: Telegram alert (optional)
        if: steps.audit.outputs.status == 'fail'
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        shell: bash
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then echo "Telegram secrets not set - skipping."; exit 0; fi
          curl -sSf --max-time 10 "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            --data-urlencode text="🟠 Dependency Audit: high/critical advisory found. Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            > /dev/null || echo "telegram send failed (non-blocking)"

      - name: Fail the run so the Actions tab shows red
        if: steps.audit.outputs.status == 'fail'
        run: exit 1
