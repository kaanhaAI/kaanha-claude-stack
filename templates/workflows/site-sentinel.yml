# Site Sentinel (cloud template) — scheduled uptime + route health.
# Copy into <repo>/.github/workflows/, replace <...>, commit, push.
# No secrets: curls your routes, opens/updates an issue on failure.

name: site-sentinel

on:
  schedule:
    - cron: "7 */6 * * *" # every 6h, off the :00 mark
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Probe routes
        id: probe
        shell: bash
        run: |
          set -uo pipefail
          BASE="<https://your-site.example>"          # <-- your production URL
          ROUTES=("/" "/about" "/contact")             # <-- your key routes
          BRAND="<your-brand-word>"                    # <-- must appear on the homepage
          FAILURES=""
          for route in "${ROUTES[@]}"; do
            url="${BASE}${route}"
            read -r code time < <(curl -sS -o /tmp/body -w "%{http_code} %{time_total}" --max-time 20 "$url" || echo "000 0")
            echo "· $url -> HTTP $code in ${time}s"
            [ "$code" != "200" ] && FAILURES+="- ${url} returned HTTP ${code}"$'\n'
            if [ "$route" = "/" ]; then
              grep -qi "$BRAND" /tmp/body || FAILURES+="- ${url} 200 but missing \"${BRAND}\" (error shell?)"$'\n'
              awk -v t="$time" 'BEGIN{exit !(t>5.0)}' && FAILURES+="- ${url} took ${time}s (> 5s)"$'\n'
            fi
          done
          if [ -n "$FAILURES" ]; then
            echo "status=fail" >> "$GITHUB_OUTPUT"
            { echo 'report<<KAANHA_SENTINEL_EOF'; echo "$FAILURES"; echo 'KAANHA_SENTINEL_EOF'; } >> "$GITHUB_OUTPUT"
          else
            echo "status=ok" >> "$GITHUB_OUTPUT"
          fi
      - name: Open or update failure issue
        if: steps.probe.outputs.status == 'fail'
        uses: actions/github-script@v7
        with:
          script: |
            // toJSON output must never be spliced into a template literal:
            // backticks/${} in report text would break or execute inside
            // github-script. Assign, then concatenate.
            const report = ${{ toJSON(steps.probe.outputs.report) }};
            const body = "Site Sentinel detected a problem:\n\n" + report;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: "open", labels: "site-sentinel" });
            if (existing.data.length) {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data[0].number, body });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo,
                title: "Site Sentinel: health check failed", body, labels: ["site-sentinel"] });
            }
      # Optional Telegram push alert - dormant until TELEGRAM_BOT_TOKEN +
      # TELEGRAM_CHAT_ID repo secrets exist. Static text + run URL only;
      # never interpolate report content (injection surface).
      - name: Telegram alert (optional)
        if: steps.probe.outputs.status == 'fail'
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        shell: bash
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then echo "Telegram secrets not set - skipping."; exit 0; fi
          curl -sSf --max-time 10 "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            --data-urlencode text="🔴 Site Sentinel: health check FAILED. Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            > /dev/null || echo "telegram send failed (non-blocking)"
      - name: Show red on failure
        if: steps.probe.outputs.status == 'fail'
        run: exit 1
